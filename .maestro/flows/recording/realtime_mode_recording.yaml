tags:
  - recording
---
# Task 90: Realtime mode recording flow
# Switches to realtime model, records, verifies state transitions
- runFlow: helpers/launch_app.yaml

# Switch to realtime model via helper
- runFlow: settings/change_model_to_realtime.yaml

# Tap "Start Recording"
- tapOn: "Start Recording"

# Verify recording state
- assertVisible:
    text: "Stop Recording"
    timeout: 5000

# Wait 3 seconds
- swipe:
    direction: LEFT
    duration: 3000

# Tap "Stop Recording"
- tapOn: "Stop Recording"

# Wait for return to idle state
- assertVisible:
    text: "Start Recording"
    timeout: 20000
