tags:
  - smoke
  - recording
---
# Task 90: File mode recording flow
# Verifies: start recording -> stop -> transcribing state -> completion
- runFlow: helpers/launch_app.yaml

# Tap "Start Recording"
- tapOn: "Start Recording"

# Verify recording state
- assertVisible:
    text: "Stop Recording"
    timeout: 5000

# Wait 3 seconds for audio capture
- swipe:
    direction: LEFT
    duration: 3000

# Tap "Stop Recording"
- tapOn: "Stop Recording"

# Verify transcribing state appears
- assertVisible:
    text: "Transcribing"
    timeout: 5000

# Wait for transcription to complete (Whisper inference is slow)
- assertVisible:
    text: "Start Recording"
    timeout: 20000
