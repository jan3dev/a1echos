tags:
  - session
---
# Task 91: Delete a session
- runFlow: helpers/launch_app.yaml

# Create a recording first
- runFlow: helpers/create_recording.yaml

# Navigate to home
- tapOn:
    point: "8%,7%"

# Verify session exists
- assertVisible:
    text: "Session"
    timeout: 5000

# Tap 3-dot more menu on the session
- tapOn:
    point: "92%,20%"

# Tap "Delete"
- tapOn: "Delete"

# Confirm deletion
- tapOn: "Delete"

# Verify session is gone (empty state should show)
- assertNotVisible:
    text: "Session"
    timeout: 5000
