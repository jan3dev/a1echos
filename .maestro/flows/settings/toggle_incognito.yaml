---
# Task 92: Toggle incognito mode on and off
- runFlow: helpers/launch_app.yaml

# Tap ghost/incognito icon (top area, no accessibility label)
- tapOn:
    point: "82%,7%"

# Verify explainer modal appears
- assertVisible:
    text: "Got it!"
    timeout: 5000

# Dismiss the modal
- tapOn: "Got it!"

# Toggle incognito off by tapping ghost icon again
- tapOn:
    point: "82%,7%"

# Verify we're back to normal mode (Start Recording should be visible)
- assertVisible:
    text: "Start Recording"
    timeout: 5000
