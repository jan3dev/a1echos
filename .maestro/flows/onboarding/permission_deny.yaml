---
# Task 94: Permission deny flow
# Launch with microphone permission denied
- launchApp:
    clearState: true
    permissions:
      microphone: deny

# Tap record button
- tapOn: "Start Recording"

# Verify recording does NOT start (should still show "Start Recording")
- assertVisible:
    text: "Start Recording"
    timeout: 3000

# Verify "Stop Recording" is NOT visible
- assertNotVisible: "Stop Recording"
