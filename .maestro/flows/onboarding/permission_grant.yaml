---
# Task 94: Permission grant flow
# Launch WITHOUT pre-granted microphone permission
- launchApp:
    clearState: true

# Tap record button - should trigger permission dialog
- tapOn: "Start Recording"

# Tap "Allow" on the system permission dialog
- tapOn:
    text: "Allow"
    optional: true

# Verify recording starts after permission grant
- assertVisible:
    text: "Stop Recording"
    timeout: 5000

# Stop the recording
- tapOn: "Stop Recording"

# Wait for completion
- assertVisible:
    text: "Start Recording"
    timeout: 20000
