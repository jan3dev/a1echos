tags:
  - transcription
---
# Task 93: Share a single transcription
- runFlow: helpers/launch_app.yaml

# Create a recording
- runFlow: helpers/create_recording.yaml

# Long-press on the transcription to enter selection mode
- longPressOn:
    point: "50%,50%"

# Verify Share action is visible
- assertVisible:
    text: "Share"
    timeout: 5000

# Tap Share
- tapOn: "Share"
