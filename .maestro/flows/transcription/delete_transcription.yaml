tags:
  - transcription
---
# Task 93: Delete a single transcription
- runFlow: helpers/launch_app.yaml

# Create a recording
- runFlow: helpers/create_recording.yaml

# Long-press on the transcription to enter selection mode
- longPressOn:
    point: "50%,50%"

# Tap trash icon (top-right in selection mode)
- tapOn:
    point: "92%,7%"

# Confirm deletion
- tapOn: "Delete"

# Verify transcription is removed
- assertVisible:
    text: "Start Recording"
    timeout: 5000
